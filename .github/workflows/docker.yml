name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Secrets
        run: |
          echo "USERNAME_LENGTH=$(echo -n '${{ secrets.DOCKER_USERNAME }}' | wc -c)"
          echo "PASSWORD_LENGTH=$(echo -n '${{ secrets.DOCKER_PASSWORD }}' | wc -c)"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t gall96/lifegoals:latest .

      - name: Push Image
        run: |
          docker push gall96/lifegoals:latest
